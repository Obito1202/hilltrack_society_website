<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Hilltrack Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  :root { --bg:#F9F6F0; --surface:#F2EFEB; --ink:#1C3325; --soft:#4A564F; --accent:#C86A41; --line:#E3DED8; --err:#B83A3A; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Outfit',system-ui,sans-serif}
  header{border-bottom:1px solid var(--line);padding:18px 28px;display:flex;align-items:center;justify-content:space-between}
  header h1{font-family:'Cormorant Garamond',serif;font-size:24px;margin:0}
  main{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 65px)}
  nav{border-right:1px solid var(--line);padding:18px 12px}
  nav button{display:block;width:100%;text-align:left;background:none;border:none;color:var(--ink);font:inherit;padding:12px 14px;cursor:pointer;font-size:14px}
  nav button.active{background:var(--ink);color:var(--bg)}
  section{padding:32px}
  h2{font-family:'Cormorant Garamond',serif;font-size:32px;margin:0 0 24px}
  .row{display:flex;justify-content:space-between;align-items:center;padding:14px;border:1px solid var(--line);margin-bottom:8px;background:#fff}
  .row .meta{font-size:12px;color:var(--soft);margin-top:4px}
  .row .title{font-family:'Cormorant Garamond',serif;font-size:18px}
  .btn{padding:10px 18px;border:none;background:var(--accent);color:var(--bg);cursor:pointer;font:inherit;font-size:13px;display:inline-flex;gap:6px;align-items:center}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--ink)}
  .btn.danger{background:transparent;color:var(--err);border:1px solid var(--err)}
  .form{background:var(--surface);padding:24px;border:1px solid var(--line);margin-bottom:24px}
  .form .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .form label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.15em;color:var(--accent);font-weight:600}
  .form input,.form textarea{width:100%;padding:8px 10px;font:inherit;font-size:14px;background:#fff;border:1px solid var(--line);color:var(--ink);margin-top:6px;border-radius:0}
  .form textarea{min-height:80px}
  .full{grid-column:1/-1}
  .imgwrap{display:flex;gap:10px;align-items:center;margin-top:8px}
  .imgwrap img{height:60px;width:60px;object-fit:contain;border:1px solid var(--line)}
  .toast{position:fixed;top:16px;right:16px;background:var(--ink);color:var(--bg);padding:10px 16px;font-size:13px;opacity:0;transition:opacity .3s}
  .toast.show{opacity:1}
  .actions{display:flex;gap:8px}
  .note{font-size:12px;color:var(--soft);margin-top:6px}
</style>
</head>
<body>
<header>
  <h1>Hilltrack Admin</h1>
  <div style="font-size:12px;color:var(--soft)">Local-only · edits write to <code>public/data/*.json</code></div>
</header>
<main>
  <nav id="nav"></nav>
  <section id="content"></section>
</main>
<div class="toast" id="toast"></div>
<script>
const TABS = [
  { k:"members",      label:"Members",      fields:[["name","Name"],["role","Role"],["email","Email"],["description","Description","textarea"],["order","Order","number"],["image_url","Photo","image"]] },
  { k:"events",       label:"Events",       fields:[["title","Title"],["date","Date","date"],["location","Location"],["description","Description","textarea"],["image_url","Image","image"]] },
  { k:"initiatives",  label:"Initiatives",  fields:[["title","Title"],["date","Date","date"],["location","Location"],["description","Description","textarea"],["image_url","Image","image"]] },
  { k:"achievements", label:"Achievements", fields:[["title","Title"],["year","Year"],["description","Description","textarea"],["image_url","Image","image"]] },
  { k:"schools",      label:"Schools",      fields:[["name","School name"],["location","Location"],["visit_date","Visit date","date"],["description","Description","textarea"],["image_url","Image","image"]] },
  { k:"gallery",      label:"Gallery",      fields:[["caption","Caption"],["image_url","Image","image"]] },
  { k:"settings",     label:"Site Settings" },
  { k:"books",        label:"📚 Books" },
];
let current = "members", editing = null, form = {};

// ── Firebase state for Books tab ─────────────────────────────────────────────
let fbApp = null, fbAuth = null, fbDb = null;

async function ensureFirebase() {
  if (fbApp) return true;
  try {
    const cfg = await fetch('/api/firebase-config').then(r => r.json());
    if (!cfg || !cfg.projectId || cfg.apiKey === 'REPLACE_WITH_YOUR_API_KEY') return false;
    fbApp  = firebase.initializeApp(cfg);
    fbAuth = firebase.auth();
    fbDb   = firebase.firestore();
    return true;
  } catch { return false; }
}

const BOOK_CLASSES = Array.from({length:12}, (_,i) => `class${i+1}`);
const cn = id => id.replace('class','Class ');

async function renderBooks() {
  const ok = await ensureFirebase();
  if (!ok) {
    $('#content').innerHTML = `
      <h2>Book Exchange</h2>
      <div class="form" style="max-width:640px">
        <p style="margin-bottom:4px">Firebase is not configured yet. Open <code>src/lib/firebase.js</code> and replace the placeholder values with your Firebase project credentials, then restart the admin server.</p>
        <p style="font-size:12px;color:var(--soft);margin-top:8px">Need help? Follow the setup instructions at the top of <code>src/lib/firebase.js</code>.</p>
      </div>`;
    return;
  }

  const user = fbAuth.currentUser;
  if (!user) {
    $('#content').innerHTML = `
      <h2>Book Exchange</h2>
      <p style="color:var(--soft);margin-bottom:16px">Sign in with your Google account to manage books and requests.</p>
      <button class="btn" id="fb-signin">Sign in with Google</button>`;
    $('#fb-signin').onclick = () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      fbAuth.signInWithPopup(provider).then(() => renderBooks()).catch(e => alert(e.message));
    };
    return;
  }

  // Fetch data
  const [booksSnap, reqsSnap] = await Promise.all([
    fbDb.collection('books').get(),
    fbDb.collection('bookRequests').where('status','==','pending').orderBy('createdAt','asc').get().catch(() =>
      fbDb.collection('bookRequests').where('status','==','pending').get()
    ),
  ]);

  const booksData = {};
  booksSnap.forEach(d => { booksData[d.id] = d.data(); });
  const requests = reqsSnap.docs.map(d => ({ id: d.id, ...d.data() }));

  $('#content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <h2 style="margin:0">Book Exchange</h2>
      <div style="display:flex;align-items:center;gap:10px;font-size:13px">
        <span style="color:var(--soft)">${user.email}</span>
        <button class="btn ghost" id="fb-signout">Sign out</button>
        <button class="btn" id="fb-refresh">↻ Refresh</button>
      </div>
    </div>

    <h3 style="font-family:'Cormorant Garamond',serif;font-size:22px;margin:28px 0 12px">Inventory — adjust current stock</h3>
    <p style="font-size:12px;color:var(--soft);margin:-4px 0 12px">
      <strong>Current</strong> = books physically on hand. <strong>Available</strong> = current minus pending requests.
      Use + / − to update stock after receiving or handing out books.
    </p>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:32px">
      ${BOOK_CLASSES.map(id => {
        const b = booksData[id] || {current:0, requested:0};
        const avail = Math.max(0, (b.current||0) - (b.requested||0));
        return `
          <div style="border:1px solid var(--line);padding:12px;text-align:center;background:#fff">
            <div style="font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--soft)">${cn(id)}</div>
            <div style="font-size:28px;font-weight:600;color:var(--ink);line-height:1.2;margin:6px 0">${avail}</div>
            <div style="font-size:11px;color:var(--soft)">avail (${b.current||0}−${b.requested||0})</div>
            <div style="display:flex;gap:4px;justify-content:center;margin-top:10px">
              <button class="btn danger" data-adj="${id}" data-delta="-1" style="padding:4px 12px;font-size:16px;line-height:1">−</button>
              <button class="btn" data-adj="${id}" data-delta="1" style="padding:4px 12px;font-size:16px;line-height:1">+</button>
            </div>
          </div>`;
      }).join('')}
    </div>

    <h3 style="font-family:'Cormorant Garamond',serif;font-size:22px;margin:0 0 12px">Pending Requests (${requests.length})</h3>
    ${requests.length ? requests.map(r => `
      <div class="row">
        <div>
          <div class="title">${r.studentName || r.studentEmail}</div>
          <div class="meta">
            Giving ${cn(r.giveClass||'')} → Wants ${cn(r.wantClass||'')}
            &nbsp;·&nbsp; ${r.studentEmail}
          </div>
        </div>
        <div class="actions">
          <button class="btn" data-fulfill="${r.id}" data-want="${r.wantClass}">✓ Fulfill</button>
          <button class="btn danger" data-cancel="${r.id}" data-want="${r.wantClass}">✕ Cancel</button>
        </div>
      </div>`).join('') : '<p style="color:var(--soft);font-size:14px">No pending requests.</p>'}`;

  $('#fb-signout').onclick = () => fbAuth.signOut().then(() => renderBooks());
  $('#fb-refresh').onclick = () => renderBooks();

  document.querySelectorAll('[data-adj]').forEach(btn => {
    btn.onclick = async () => {
      const classId = btn.dataset.adj;
      const delta   = parseInt(btn.dataset.delta);
      const ref     = fbDb.collection('books').doc(classId);
      try {
        await fbDb.runTransaction(async tx => {
          const snap = await tx.get(ref);
          const cur  = snap.exists ? (snap.data().current || 0) : 0;
          const req  = snap.exists ? (snap.data().requested || 0) : 0;
          if (snap.exists) tx.update(ref, { current: Math.max(0, cur + delta) });
          else tx.set(ref, { current: Math.max(0, delta), requested: 0 });
        });
        toast(delta > 0 ? 'Added 1 set' : 'Removed 1 set');
        renderBooks();
      } catch(e) { alert(e.message); }
    };
  });

  document.querySelectorAll('[data-fulfill]').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('Mark this request as fulfilled? This will decrement current stock by 1.')) return;
      const reqId    = btn.dataset.fulfill;
      const wantCls  = btn.dataset.want;
      try {
        await fbDb.runTransaction(async tx => {
          const bookRef  = fbDb.collection('books').doc(wantCls);
          const reqRef   = fbDb.collection('bookRequests').doc(reqId);
          const bookSnap = await tx.get(bookRef);
          const b        = bookSnap.exists ? bookSnap.data() : {current:0, requested:0};
          tx.update(bookRef, {
            current:   Math.max(0, (b.current||0) - 1),
            requested: Math.max(0, (b.requested||0) - 1),
          });
          tx.update(reqRef, { status:'fulfilled', fulfilledAt: firebase.firestore.FieldValue.serverTimestamp() });
        });
        toast('Request fulfilled');
        renderBooks();
      } catch(e) { alert(e.message); }
    };
  });

  document.querySelectorAll('[data-cancel]').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('Cancel this request? The student will need to request again.')) return;
      const reqId   = btn.dataset.cancel;
      const wantCls = btn.dataset.want;
      try {
        await fbDb.runTransaction(async tx => {
          const bookRef  = fbDb.collection('books').doc(wantCls);
          const reqRef   = fbDb.collection('bookRequests').doc(reqId);
          const bookSnap = await tx.get(bookRef);
          const b        = bookSnap.exists ? bookSnap.data() : {current:0, requested:0};
          tx.update(bookRef, { requested: Math.max(0, (b.requested||0) - 1) });
          tx.update(reqRef, { status:'cancelled', cancelledAt: firebase.firestore.FieldValue.serverTimestamp() });
        });
        toast('Request cancelled');
        renderBooks();
      } catch(e) { alert(e.message); }
    };
  });
}

const $ = (s) => document.querySelector(s);
const toast = (m) => { const t=$('#toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); };
const api = (m,u,b) => fetch(u,{method:m,headers:b?{'Content-Type':'application/json'}:{},body:b?JSON.stringify(b):undefined}).then(r=>r.json());

function renderNav() {
  $('#nav').innerHTML = TABS.map(t => `<button class="${t.k===current?'active':''}" data-tab="${t.k}">${t.label}</button>`).join('');
  $('#nav').querySelectorAll('button').forEach(b => b.onclick = () => { current=b.dataset.tab; editing=null; form={}; render(); });
}

async function render() {
  renderNav();
  if (current === "settings") return renderSettings();
  if (current === "books")    return renderBooks();
  const tab = TABS.find(t => t.k===current);
  const items = await api('GET',`/api/${current}`);
  const formHtml = editing ? renderForm(tab) : '';
  $('#content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2>Manage ${tab.label}</h2>
      ${editing ? '' : `<button class="btn" id="add">+ Add new</button>`}
    </div>
    ${formHtml}
    <div>${items.map(it => `
      <div class="row">
        <div>
          <div class="title">${it.name||it.title||it.caption||'(untitled)'}</div>
          <div class="meta">${[it.role,it.year,it.location,it.date,it.visit_date].filter(Boolean).join(' · ')}</div>
        </div>
        <div class="actions">
          ${current!=="gallery" ? `<button class="btn ghost" data-edit="${it.id}">Edit</button>` : ''}
          <button class="btn danger" data-del="${it.id}">Delete</button>
        </div>
      </div>`).join('') || '<p style="color:var(--soft);font-size:14px">Nothing here yet.</p>'}
    </div>`;
  if ($('#add')) $('#add').onclick = () => { editing = 'new'; form = {}; render(); };
  document.querySelectorAll('[data-edit]').forEach(b => b.onclick = async () => {
    const it = (await api('GET',`/api/${current}`)).find(x=>x.id===b.dataset.edit);
    editing = it.id; form = {...it}; render();
  });
  document.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
    if (!confirm("Delete this item?")) return;
    await api('DELETE',`/api/${current}/${b.dataset.del}`); toast("Deleted"); render();
  });
  bindForm();
}

function renderForm(tab) {
  return `<div class="form"><div class="grid">${tab.fields.map(([key,label,type]) => {
    if (type==="image") return `
      <div class="full">
        <label>${label}</label>
        <div class="imgwrap">
          ${form[key] ? `<img src="/${form[key]}" alt="">` : ''}
          <input type="file" accept="image/*" data-imgkey="${key}">
          ${form[key] ? `<button class="btn ghost" data-clear="${key}" type="button">Remove</button>` : ''}
        </div>
      </div>`;
    if (type==="textarea") return `<div class="full"><label>${label}</label><textarea data-key="${key}">${form[key]||''}</textarea></div>`;
    return `<div><label>${label}</label><input type="${type||'text'}" data-key="${key}" value="${form[key]??''}"></div>`;
  }).join('')}</div>
  <div style="margin-top:16px;display:flex;gap:8px"><button class="btn" id="save">Save</button><button class="btn ghost" id="cancel">Cancel</button></div></div>`;
}

function bindForm() {
  document.querySelectorAll('[data-key]').forEach(el => el.oninput = () => { form[el.dataset.key] = el.type==='number' ? Number(el.value) : el.value; });
  document.querySelectorAll('[data-clear]').forEach(b => b.onclick = () => { form[b.dataset.clear] = ''; render(); });
  document.querySelectorAll('[data-imgkey]').forEach(inp => inp.onchange = async () => {
    const fd = new FormData(); fd.append('file', inp.files[0]);
    const r = await fetch('/api/upload',{method:'POST',body:fd}).then(r=>r.json());
    form[inp.dataset.imgkey] = r.url; toast("Image uploaded"); render();
  });
  if ($('#save')) $('#save').onclick = async () => {
    if (editing==='new') await api('POST',`/api/${current}`, form);
    else await api('PUT',`/api/${current}/${editing}`, form);
    toast("Saved"); editing=null; form={}; render();
  };
  if ($('#cancel')) $('#cancel').onclick = () => { editing=null; form={}; render(); };
}

async function renderSettings() {
  const s = await api('GET','/api/settings');
  const stats = s.homepage_stats || [];
  const tiers = s.donation_tiers || [];
  const rowList = (list, fields, listName) => list.map((row,i) => `
    <div class="row" style="background:#fff;display:grid;grid-template-columns:${fields.map(()=>'1fr').join(' ')} 90px;gap:8px;align-items:center;padding:8px">
      ${fields.map(([k,ph]) => `<input data-list="${listName}" data-i="${i}" data-k="${k}" placeholder="${ph}" value="${(row[k]??'').toString().replace(/"/g,'&quot;')}">`).join('')}
      <button class="btn danger" data-remove="${listName}" data-i="${i}" type="button">Remove</button>
    </div>`).join('');
  $('#content').innerHTML = `<h2>Site Settings</h2>
    <div class="form" style="max-width:880px">
      <div class="grid">
        <div class="full"><label>About text</label><textarea id="about" rows="5">${s.about||''}</textarea></div>
        <div class="full"><label>Aims (one per line)</label><textarea id="aims" rows="10">${(s.aims||[]).join('\n')}</textarea></div>
        <div><label>Contact Email</label><input id="contact_email" value="${s.contact_email||''}"></div>
        <div><label>Contact Phone</label><input id="contact_phone" value="${s.contact_phone||''}"></div>
        <div class="full"><label>Address</label><textarea id="contact_address" rows="2">${s.contact_address||''}</textarea></div>
        <div class="full"><label>Bank Details (Donate page)</label><textarea id="bank_details" rows="5">${s.bank_details||''}</textarea></div>
        <div><label>UPI ID</label><input id="upi_id" value="${s.upi_id||''}"></div>

        <div class="full" style="margin-top:8px">
          <label>Homepage Stats (shown under hero) — number and label</label>
          <div id="stats_list">${rowList(stats, [['value','e.g. 250+'],['label','e.g. Students Mentored']], 'stats')}</div>
          <button class="btn ghost" id="add_stat" type="button" style="margin-top:8px">+ Add stat</button>
          <p class="note">Tip: keep numbers short. 6 stats look best (2 rows of 3).</p>
        </div>

        <div class="full" style="margin-top:8px">
          <label>Donation Tiers (shown on Donate page) — amount and what it does</label>
          <div id="tiers_list">${rowList(tiers, [['amount','e.g. ₹500'],['description','e.g. Stationery kit for one student']], 'tiers')}</div>
          <button class="btn ghost" id="add_tier" type="button" style="margin-top:8px">+ Add tier</button>
        </div>
      </div>
      <div style="margin-top:16px"><button class="btn" id="ssave">Save settings</button></div>
      <p class="note">After saving, commit <code>public/data/settings.json</code> and push to GitHub to publish.</p>
    </div>`;

  // Local working copies
  const work = { stats: stats.map(x=>({...x})), tiers: tiers.map(x=>({...x})) };
  const bindListInputs = () => {
    document.querySelectorAll('[data-list]').forEach(inp => inp.oninput = () => {
      work[inp.dataset.list][+inp.dataset.i][inp.dataset.k] = inp.value;
    });
    document.querySelectorAll('[data-remove]').forEach(btn => btn.onclick = () => {
      work[btn.dataset.remove].splice(+btn.dataset.i, 1); rerenderLists();
    });
  };
  const rerenderLists = () => {
    $('#stats_list').innerHTML = rowList(work.stats, [['value','e.g. 250+'],['label','e.g. Students Mentored']], 'stats');
    $('#tiers_list').innerHTML = rowList(work.tiers, [['amount','e.g. ₹500'],['description','e.g. Stationery kit for one student']], 'tiers');
    bindListInputs();
  };
  bindListInputs();
  $('#add_stat').onclick = () => { work.stats.push({ value:'', label:'' }); rerenderLists(); };
  $('#add_tier').onclick = () => { work.tiers.push({ amount:'', description:'' }); rerenderLists(); };

  $('#ssave').onclick = async () => {
    const body = {
      about: $('#about').value,
      aims: $('#aims').value.split('\n').map(l=>l.trim()).filter(Boolean),
      contact_email: $('#contact_email').value,
      contact_phone: $('#contact_phone').value,
      contact_address: $('#contact_address').value,
      bank_details: $('#bank_details').value,
      upi_id: $('#upi_id').value,
      homepage_stats: work.stats.filter(x => (x.value||'').trim() || (x.label||'').trim()),
      donation_tiers: work.tiers.filter(x => (x.amount||'').trim() || (x.description||'').trim()),
    };
    await api('PUT','/api/settings', body);
    toast("Settings saved");
  };
}

render();
</script>
</body>
</html>
